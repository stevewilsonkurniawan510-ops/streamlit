name: Enforce Pre-Commit Hooks

on:
  push:
    branches:
      - "develop"
  pull_request:
    types: [opened, synchronize, reopened]
  # Allows workflow to be called from other workflows
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

# Avoid duplicate workflows on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-enforce-pre-commit
  cancel-in-progress: true

jobs:
  enforce-pre-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Streamlit code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          submodules: "recursive"
          fetch-depth: 2
      - name: Set Python version vars
        uses: ./.github/actions/build_info
      - name: Set up Python ${{ env.PYTHON_MAX_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_MAX_VERSION }}"
      - name: Restore pre-commit cache
        id: cache-pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: v1-pre-commit-${{ env.pythonLocation }}-${{ hashFiles('**/.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install-hooks
        shell: bash
      - name: Enable Corepack
        run: corepack enable
        shell: bash
      - name: Install prettier
        run: cd frontend && yarn install
      - name: Run pre-commit hooks
        id: pre-commit
        run: |
          # Capture output for analysis
          PRE_COMMIT_NO_CONCURRENCY=true pre-commit run --show-diff-on-failure --color=always --all-files 2>&1 | tee /tmp/precommit_output.txt
          # Return the exit code from pre-commit
          exit ${PIPESTATUS[0]}
      - name: Analyze pre-commit failure and provide specific instructions
        if: failure() && steps.pre-commit.outcome == 'failure'
        run: |
          echo "❌ Pre-commit hooks failed!"
          echo ""

          # Read the pre-commit output
          PRECOMMIT_OUTPUT=$(cat /tmp/precommit_output.txt || echo "")

          # Check for specific hook failures and provide targeted instructions
          if echo "$PRECOMMIT_OUTPUT" | grep -q "generate-agent-rules"; then
            echo "🔧 Agent rules are out of sync!"
            echo ""
            echo "Your changes to AGENTS.md files require regenerating cursor rules:"
            echo "   python scripts/generate_agent_rules.py"
            echo ""
            echo "Then commit the updated .cursor/rules/ and .github/instructions/ files."
            echo ""
          fi

          if echo "$PRECOMMIT_OUTPUT" | grep -q "ruff\|Ruff"; then
            echo "🔧 Python code formatting/linting issues detected!"
            echo ""
            echo "Fix Python issues with:"
            echo "   make python-format    # Format Python files"
            echo "   make python-lint      # Check for remaining issues"
            echo ""
          fi

          if echo "$PRECOMMIT_OUTPUT" | grep -q "prettier\|Prettier"; then
            echo "🔧 Frontend code formatting issues detected!"
            echo ""
            echo "Fix frontend formatting with:"
            echo "   make frontend-format  # Format TypeScript/JavaScript files"
            echo ""
          fi

          if echo "$PRECOMMIT_OUTPUT" | grep -q "license\|insert-license"; then
            echo "🔧 Missing or incorrect license headers!"
            echo ""
            echo "License headers will be automatically added when you run:"
            echo "   pre-commit run --all-files"
            echo ""
          fi

          if echo "$PRECOMMIT_OUTPUT" | grep -q "vscode-devcontainer-sync"; then
            echo "🔧 VSCode/devcontainer files are out of sync!"
            echo ""
            echo "Update the sync with:"
            echo "   python scripts/sync_vscode_devcontainer.py"
            echo ""
          fi

          echo "🔧 General fix commands:"
          echo ""
          echo "1. Install pre-commit (if not already installed):"
          echo "   pip install pre-commit"
          echo "   pre-commit install"
          echo ""
          echo "2. Run the autofix command to fix most issues automatically:"
          echo "   make autofix"
          echo ""
          echo "3. Run pre-commit locally to check your changes:"
          echo "   pre-commit run --all-files"
          echo ""
          echo "4. Commit your changes and push again."
          echo ""
          echo "For more details, see: https://github.com/streamlit/streamlit/wiki/Contributing"
